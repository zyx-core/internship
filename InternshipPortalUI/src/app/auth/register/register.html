<div style="max-width: 450px; margin: 60px auto; padding: 25px; border: 1px solid #ddd; border-radius: 6px; font-family: sans-serif;">
  <h3>Student Identity Registration</h3>
  <p style="font-size: 14px; color: #666;">Create an operational profile to access internship allocations.</p>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 12px;">
      <label style="display:block; margin-bottom:4px;">Full Name</label>
      <input type="text" formControlName="name" style="width:100%; padding:8px; box-sizing: border-box;" />
    </div>

    <div style="margin-bottom: 12px;">
      <label style="display:block; margin-bottom:4px;">Institutional Email Address</label>
      <input type="email" formControlName="email" style="width:100%; padding:8px; box-sizing: border-box;" />
      <div *ngIf="registerForm.controls.email.touched && registerForm.controls.email.invalid" style="color: red; font-size: 12px; margin-top:2px;">
        Provide a valid structural tracking email.
      </div>
    </div>

    <div style="margin-bottom: 12px;">
      <label style="display:block; margin-bottom:4px;">University Roll Number</label>
      <input type="text" formControlName="rollNumber" style="width:100%; padding:8px; box-sizing: border-box;" />
    </div>

    <div style="margin-bottom: 18px;">
      <label style="display:block; margin-bottom:4px;">Security Password</label>
      <input type="password" formControlName="password" style="width:100%; padding:8px; box-sizing: border-box;" />
      <div *ngIf="registerForm.controls.password.touched && registerForm.controls.password.invalid" style="color: red; font-size: 12px; margin-top:2px;">
        Password length must exceed 5 alphanumeric characters.
      </div>
    </div>

    <button type="submit" [disabled]="registerForm.invalid" style="padding: 10px 15px; background: #007bff; color: #fff; border:none; cursor:pointer; width:100%; font-size:15px; border-radius:4px;">
      Register Account Context
    </button>
  </form>

  <p *ngIf="errorMessage" style="color: red; margin-top: 15px; font-size:14px; text-align:center;">{{ errorMessage }}</p>
  <p *ngIf="successMessage" style="color: green; margin-top: 15px; font-size:14px; text-align:center;">{{ successMessage }}</p>

  <div style="margin-top: 20px; text-align: center; font-size: 14px;">
    <a routerLink="/login" style="color: #007bff; text-decoration: none;">Already have an operational account? Login</a>
  </div>
</div>
